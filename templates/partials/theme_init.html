<script>
  (function () {
    var root = document.documentElement;
    var prefersDark = false;
    try {
      prefersDark = !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
    } catch (_err) {
      prefersDark = false;
    }
    if (prefersDark) {
      root.classList.add("theme-dark");
    } else {
      root.classList.remove("theme-dark");
    }
  })();
</script>
